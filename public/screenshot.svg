<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#0f172a"/>

  <!-- header -->
  <rect x="48" y="40" width="1184" height="96" rx="14" fill="url(#g)" opacity="0.12"/>
  <text x="80" y="100" fill="#ffffff" font-family="Segoe UI, Roboto, Arial" font-size="34" font-weight="700">AI Product Recommender</text>
  <text x="80" y="132" fill="#cbd5e1" font-family="Segoe UI, Roboto, Arial" font-size="14">Get concise, explainable product matches from a small dataset</text>

  <!-- search bar -->
  <rect x="80" y="170" width="1080" height="52" rx="10" fill="#0b1220"/>
  <text x="100" y="205" fill="#94a3b8" font-family="Segoe UI, Roboto, Arial" font-size="14">e.g. "Looking for a phone under $500"</text>

  <!-- product cards -->
  <g transform="translate(80,240)">
    <!-- card 1 -->
    <rect x="0" y="0" width="360" height="140" rx="14" fill="#071129" opacity="0.9"/>
    <text x="20" y="36" fill="#fff" font-family="Segoe UI, Roboto" font-size="16" font-weight="600">PixelLite 5</text>
    <text x="20" y="62" fill="#9fb0c8" font-family="Segoe UI, Roboto" font-size="12">Phone · $399 · 4.5★</text>
    <rect x="20" y="80" width="64" height="24" rx="12" fill="#0ea5a3" opacity="0.12"/>
    <text x="26" y="96" fill="#4dd0c6" font-family="Segoe UI" font-size="11">Great camera</text>

    <!-- card 2 -->
    <rect x="400" y="0" width="360" height="140" rx="14" fill="#071129" opacity="0.9"/>
    <text x="420" y="36" fill="#fff" font-family="Segoe UI, Roboto" font-size="16" font-weight="600">SoundBeat X</text>
    <text x="420" y="62" fill="#9fb0c8" font-family="Segoe UI, Roboto" font-size="12">Headphones · $129 · 4.6★</text>
    <rect x="420" y="80" width="100" height="24" rx="12" fill="#7c3aed" opacity="0.12"/>
    <text x="426" y="96" fill="#c7b3ff" font-family="Segoe UI" font-size="11">Studio sound</text>

    <!-- card 3 -->
    <rect x="800" y="0" width="360" height="140" rx="14" fill="#071129" opacity="0.9"/>
    <text x="820" y="36" fill="#fff" font-family="Segoe UI, Roboto" font-size="16" font-weight="600">LiteBook 13</text>
    <text x="820" y="62" fill="#9fb0c8" font-family="Segoe UI, Roboto" font-size="12">Laptop · $899 · 4.4★</text>
    <rect x="820" y="80" width="120" height="24" rx="12" fill="#06b6d4" opacity="0.12"/>
    <text x="828" y="96" fill="#7ee7f0" font-family="Segoe UI" font-size="11">Great for students</text>
  </g>

  <!-- recommendation panel -->
  <rect x="80" y="410" width="1184" height="230" rx="14" fill="#071129" opacity="0.6"/>
  <text x="100" y="448" fill="#fff" font-family="Segoe UI" font-size="18" font-weight="700">Recommendations</text>
  <text x="100" y="480" fill="#cbd5e1" font-family="Segoe UI" font-size="14">1) PixelLite 5 — compact, excellent camera for the price.</text>
  <text x="100" y="504" fill="#9fb0c8" font-family="Segoe UI" font-size="13">2) SoundBeat X — if music quality is your priority.</text>

  <!-- subtle blobs -->
  <circle cx="1120" cy="100" r="80" fill="url(#g)" opacity="0.08" filter="url(#blur)"/>
  <circle cx="220" cy="620" r="120" fill="#7c3aed" opacity="0.06" filter="url(#blur)"/>
</svg>
